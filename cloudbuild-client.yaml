steps:
  # Pull existing image for layer cache
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - 'docker pull gcr.io/$PROJECT_ID/zenven-client:latest || true'

  # Build client image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--cache-from'
      - 'gcr.io/$PROJECT_ID/zenven-client:latest'
      - '-t'
      - 'gcr.io/$PROJECT_ID/zenven-client:$BUILD_ID'
      - '-t'
      - 'gcr.io/$PROJECT_ID/zenven-client:latest'
      - '-f'
      - 'client/Dockerfile'
      - '--build-arg'
      - 'VITE_API_BASE_URL=$_VITE_API_BASE_URL'
      - '--build-arg'
      - 'VITE_SOCKET_SERVER_URL=$_VITE_SOCKET_SERVER_URL'
      - '--build-arg'
      - 'VITE_SUPABASE_URL=$_VITE_SUPABASE_URL'
      - '--build-arg'
      - 'VITE_SUPABASE_ANON_KEY=$_VITE_SUPABASE_ANON_KEY'
      - '.'

images:
  - 'gcr.io/$PROJECT_ID/zenven-client:$BUILD_ID'
  - 'gcr.io/$PROJECT_ID/zenven-client:latest'

options:
  logging: CLOUD_LOGGING_ONLY
