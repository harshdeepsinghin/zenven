steps:
- name: 'gcr.io/cloud-builders/docker'
  args: [
    'build', 
    '-t', 'gcr.io/$PROJECT_ID/zenven-client', 
    '-f', 'client/Dockerfile', 
    '--build-arg', 'VITE_API_BASE_URL=$_VITE_API_BASE_URL',
    '--build-arg', 'VITE_SOCKET_SERVER_URL=$_VITE_SOCKET_SERVER_URL',
    '--build-arg', 'VITE_SUPABASE_URL=$_VITE_SUPABASE_URL',
    '--build-arg', 'VITE_SUPABASE_ANON_KEY=$_VITE_SUPABASE_ANON_KEY',
    '.'
  ]
images:
- 'gcr.io/$PROJECT_ID/zenven-client'
